id: prd_to_code
version: "1.0"
name: "PRD to Code"
description: "End-to-end pipeline: PRD → Technical Spec → Task Plan → Code → Verification → Fix. Includes human review gates at PRD and Spec stages."

skills:
  - S942doSuNGEU8QUmbKcwZv   # atta-prd-writer
  - 6qdAwkVMmsBh6jceHoNzsw   # atta-spec-writer
  - 4GDsbsyAPjzKQWgwrMUNzE   # atta-task-planner
  - Y3VomD2YJutNfWhqLXMz9Z   # atta-code-generator
  - FHkeHuffKP5vduf2UjsTMk   # atta-spec-verifier
  - EzqRGmC76cLTBZYMgVbi9r   # atta-code-fixer

initial_state: start
states:
  # ── Entry ──
  start:
    type: start
    on_enter:
      - type: log
        message: "Starting PRD-to-Code pipeline"
    transitions:
      - to: write_prd
        auto: true

  # ── Stage 1: Generate PRD ──
  write_prd:
    type: agent
    skill: S942doSuNGEU8QUmbKcwZv  # atta-prd-writer
    on_enter:
      - type: set_variable
        key: stage
        value: "prd"
      - type: log
        message: "Generating PRD from user requirements"
    transitions:
      - to: review_prd
        auto: true

  # ── Gate: Review PRD ──
  review_prd:
    type: gate
    gate:
      approver_role: product_owner
      timeout: "24h"
      on_timeout: done_timeout
      context:
        - prd_output
    on_enter:
      - type: log
        message: "PRD ready for review"
      - type: publish_event
        event_type: "atta.flow.prd_ready"
    transitions:
      - to: write_spec
        when: "approved"
      - to: write_prd
        when: "revision_requested"
      - to: done_rejected
        when: "denied"

  # ── Stage 2: Generate Technical Spec ──
  write_spec:
    type: agent
    skill: 6qdAwkVMmsBh6jceHoNzsw  # atta-spec-writer
    on_enter:
      - type: set_variable
        key: stage
        value: "spec"
      - type: log
        message: "Generating technical specification from PRD"
    transitions:
      - to: review_spec
        auto: true

  # ── Gate: Review Spec ──
  review_spec:
    type: gate
    gate:
      approver_role: tech_lead
      timeout: "24h"
      on_timeout: done_timeout
      context:
        - spec_output
    on_enter:
      - type: log
        message: "Technical spec ready for review"
      - type: publish_event
        event_type: "atta.flow.spec_ready"
    transitions:
      - to: plan_tasks
        when: "approved"
      - to: write_spec
        when: "revision_requested"
      - to: done_rejected
        when: "denied"

  # ── Stage 3: Plan Tasks ──
  plan_tasks:
    type: agent
    skill: 4GDsbsyAPjzKQWgwrMUNzE  # atta-task-planner
    on_enter:
      - type: set_variable
        key: stage
        value: "planning"
      - type: log
        message: "Decomposing spec into implementation tasks"
    transitions:
      - to: generate_code
        auto: true

  # ── Stage 4: Generate Code ──
  generate_code:
    type: agent
    skill: Y3VomD2YJutNfWhqLXMz9Z  # atta-code-generator
    on_enter:
      - type: set_variable
        key: stage
        value: "coding"
      - type: log
        message: "Generating code from task plan"
    transitions:
      - to: verify
        auto: true

  # ── Stage 5: Verify ──
  verify:
    type: agent
    skill: FHkeHuffKP5vduf2UjsTMk  # atta-spec-verifier
    on_enter:
      - type: set_variable
        key: stage
        value: "verification"
      - type: log
        message: "Verifying implementation against spec"
    transitions:
      - to: done
        when: "verification_passed"
      - to: fix_code
        auto: true

  # ── Stage 6: Fix Issues ──
  fix_code:
    type: agent
    skill: EzqRGmC76cLTBZYMgVbi9r  # atta-code-fixer
    on_enter:
      - type: set_variable
        key: stage
        value: "fixing"
      - type: log
        message: "Fixing issues found during verification"
    transitions:
      - to: verify
        auto: true

  # ── Terminal States ──
  done:
    type: end
    on_enter:
      - type: publish_event
        event_type: "atta.flow.prd_to_code.completed"
      - type: log
        message: "PRD-to-Code pipeline completed successfully"

  done_rejected:
    type: end
    on_enter:
      - type: set_variable
        key: result
        value: "rejected"
      - type: log
        message: "Pipeline stopped: review was rejected"

  done_timeout:
    type: end
    on_enter:
      - type: set_variable
        key: result
        value: "timeout"
      - type: log
        message: "Pipeline stopped: review timed out"

on_error:
  max_retries: 2
  retry_states:
    - write_prd
    - write_spec
    - plan_tasks
    - generate_code
    - verify
    - fix_code
  fallback: done_timeout
